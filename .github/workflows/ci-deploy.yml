name: CI + Vercel Deploy

on:
  push:
    branches: [mie-pivot, main]
  pull_request:
    branches: [mie-pivot, main]

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  deploy:
    needs: build
    if: github.ref == 'refs/heads/mie-pivot' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Deploy to Vercel
        run: |
          npx vercel deploy \
            --token=${{ secrets.VERCEL_TOKEN }} \
            ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} \
            --yes
